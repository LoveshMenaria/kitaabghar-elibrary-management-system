services:
  mysql:
    image: mysql:8.4
    container_name: elibrary-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: elibrary
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - elibrary_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 15
volumes:
  elibrary_mysql:

